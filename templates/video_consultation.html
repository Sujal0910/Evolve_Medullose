{% extends "base.html" %}

{% block title %}Video Consultation{% endblock %}

{% block content %}
<div class="flex flex-col h-[calc(100vh-64px)]">
    
    <div id="setup-screen" class="flex-1 flex flex-col items-center justify-center bg-brand-cream p-4">
        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-md w-full text-center border-t-4 border-brand-forest">
            <div class="mb-6">
                <span class="inline-block p-4 rounded-full bg-green-100 text-brand-forest text-4xl">
                    📹
                </span>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 mb-2">Start Video Consultation</h1>
            <p class="text-gray-600 mb-8">Connect securely. If you have an appointment, the room name is pre-filled.</p>
            
            <form id="start-form" class="space-y-4">
                <div class="text-left">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Room Name</label>
                    <input type="text" id="room-name" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-forest focus:border-brand-forest outline-none transition font-mono"
                        placeholder="e.g. Appointment-5">
                    <p class="text-xs text-gray-500 mt-1">Both Doctor and Patient must use this EXACT name.</p>
                </div>
                
                <button type="submit" 
                    class="w-full bg-brand-forest text-white font-bold py-3 px-4 rounded-lg hover:bg-green-900 transition transform hover:scale-[1.02] shadow-md">
                    Start Call
                </button>
            </form>
        </div>
    </div>

    <div id="video-container" class="hidden flex-1 relative bg-black w-full" style="height: 0px;">
        </div>
    
    <div id="call-controls" class="hidden bg-gray-900 text-white p-4 flex justify-between items-center shadow-lg z-50">
        <div>
            <span class="text-gray-400 text-sm">Connected to:</span>
            <span id="active-room" class="font-mono text-green-400 font-bold ml-2 text-lg"></span>
        </div>
        <button onclick="endCall()" class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-full font-bold transition flex items-center">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M5 3a2 2 0 00-2 2v1c0 8.284 6.716 15 15 15h1a2 2 0 002-2v-3.28a1 1 0 00-.684-.948l-4.493-1.498a1 1 0 00-1.21.502l-1.13 2.257a11.042 11.042 0 01-5.516-5.516l2.257-1.13a1 1 0 00.502-1.21L9.228 3.683A1 1 0 008.279 3H5z"></path></svg>
            End Call
        </button>
    </div>

</div>

<script src='https://meet.ffmuc.net/external_api.js'></script>

<script>
    const setupScreen = document.getElementById('setup-screen');
    const videoContainer = document.getElementById('video-container');
    const callControls = document.getElementById('call-controls');
    const activeRoomLabel = document.getElementById('active-room');
    const startForm = document.getElementById('start-form');
    const roomInput = document.getElementById('room-name');
    
    let api = null;
    const currentUser = "{{ user_name }}";
    const autoRoom = "{{ auto_room if auto_room else '' }}";

    // Initialize on load
    window.addEventListener('load', () => {
        if (autoRoom) {
            roomInput.value = autoRoom;
            startCall(autoRoom);
        }
    });

    startForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const roomName = roomInput.value;
        if(roomName) startCall(roomName);
    });

    function startCall(rawRoomName) {
        // 1. Clean the room name
        const cleanName = rawRoomName.trim().replace(/[^a-zA-Z0-9-_]/g, '');
        // Use a unique prefix to avoid collisions
        const finalRoomID = "Medullose_" + cleanName;

        // Update UI
        setupScreen.classList.add('hidden');
        videoContainer.classList.remove('hidden');
        videoContainer.style.height = "600px"; // FORCE HEIGHT TO FIX BLANK SCREEN
        callControls.classList.remove('hidden');
        activeRoomLabel.textContent = cleanName;

        // 2. USE A STABLE COMMUNITY DOMAIN
        const domain = 'meet.ffmuc.net'; 
        
        const options = {
            roomName: finalRoomID,
            width: '100%',
            height: '100%',
            parentNode: videoContainer,
            userInfo: {
                displayName: currentUser
            },
            configOverwrite: { 
                startWithAudioMuted: false,
                startWithVideoMuted: false,
                prejoinPageEnabled: false // Skip the waiting room
            },
            interfaceConfigOverwrite: {
                SHOW_JITSI_WATERMARK: false,
                TOOLBAR_BUTTONS: [
                    'microphone', 'camera', 'desktop', 'fullscreen',
                    'fodeviceselection', 'hangup', 'profile', 'chat', 
                    'raisehand', 'videoquality', 'tileview'
                ]
            }
        };

        // Cleanup old API instance
        if(api) {
            api.dispose();
        }

        try {
            api = new JitsiMeetExternalAPI(domain, options);
            
            api.addEventListeners({
                videoConferenceLeft: function () {
                    endCall();
                }
            });
        } catch (error) {
            console.error("Jitsi failed to load:", error);
            alert("Video service connection failed. Please check your internet or try again.");
            endCall();
        }
    }

    function endCall() {
        if (api) {
            api.dispose();
            api = null;
        }
        videoContainer.classList.add('hidden');
        videoContainer.style.height = "0px";
        callControls.classList.add('hidden');
        setupScreen.classList.remove('hidden');
        
        // Clear URL
        window.history.pushState({}, document.title, window.location.pathname);
    }
</script>
{% endblock %}
