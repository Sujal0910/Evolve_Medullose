{% extends "base.html" %}

{% block title %}Find a Doctor{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8 max-w-6xl">
    
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-brand-forest">Nearby Clinics & Hospitals</h1>
        <p class="text-brand-olive mt-2">Find the best specialists near you.</p>
    </div>

    <div id="map" class="shadow-lg mb-8 border-2 border-brand-stone border-opacity-50 rounded-lg h-96 w-full z-0" style="height: 400px;"></div>
    
    <div id="loading" class="text-center py-4">
        <p class="text-brand-olive font-semibold animate-pulse">Loading doctors map...</p>
    </div>

    <div id="doctors-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
        </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', async () => {
        // 1. Initialize Map
        // Default view: Lucknow/Unnao center
        const map = L.map('map').setView([26.8467, 80.9462], 12);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 2. Fetch Doctors
        try {
            const response = await fetch('/api/get_doctors');
            const doctors = await response.json();
            
            const loading = document.getElementById('loading');
            const grid = document.getElementById('doctors-grid');
            
            loading.classList.add('hidden');
            grid.classList.remove('hidden');

            // Bounds to auto-zoom map
            const markers = [];

            doctors.forEach(doc => {
                // Add Pin
                const marker = L.marker([doc.lat, doc.lng])
                    .addTo(map)
                    .bindPopup(`<b>${doc.name}</b><br>${doc.specialty}`);
                markers.push(marker);

                // Add Card (Rustic Theme)
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-lg shadow-md border border-brand-stone border-opacity-30 hover:shadow-xl transition transform hover:-translate-y-1";
                card.innerHTML = `
                    <h3 class="text-xl font-bold text-brand-forest">${doc.name}</h3>
                    <p class="text-brand-golden font-bold text-xs uppercase tracking-wider mb-2">${doc.specialty}</p>
                    <p class="text-brand-olive text-sm mb-1 h-10 overflow-hidden text-ellipsis">${doc.address}</p>
                    <p class="text-gray-400 text-xs mb-4">📞 ${doc.phone}</p>
                    
                    <a href="/book/${doc.id}" class="block w-full text-center bg-brand-forest text-brand-cream py-2 rounded font-bold hover:bg-green-900 transition">
                        Book Appointment
                    </a>
                `;
                grid.appendChild(card);
            });

            // Auto-center map if we have markers
            if (markers.length > 0) {
                const group = new L.featureGroup(markers);
                map.fitBounds(group.getBounds().pad(0.1));
            }

        } catch (error) {
            console.error('Error:', error);
            document.getElementById('loading').innerHTML = `<p class="text-red-600">Failed to load data.</p>`;
        }
    });
</script>
{% endblock %}
