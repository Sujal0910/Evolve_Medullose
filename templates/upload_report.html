{% extends "base.html" %}

{% block title %}Analyze Report{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-12 max-w-4xl">
    
    <div class="text-center mb-10">
        <h1 class="text-3xl font-bold text-brand-forest">Medical Report Analyzer</h1>
        <p class="text-brand-olive mt-2">Upload your lab report (PDF) and let AI explain the results.</p>
    </div>

    <div class="grid md:grid-cols-2 gap-8">
        
        <div class="bg-white p-8 rounded-lg shadow-md border border-brand-stone flex flex-col items-center justify-center">
            
            <div id="drop-zone" class="w-full h-64 border-2 border-dashed border-gray-300 rounded-lg flex flex-col items-center justify-center cursor-pointer hover:bg-gray-50 transition">
                <svg class="w-12 h-12 text-gray-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                <p class="text-gray-500 text-sm">Click to upload or drag PDF here</p>
                <input type="file" id="file-input" class="hidden" accept=".pdf">
            </div>

            <p id="file-name" class="mt-4 text-sm font-semibold text-brand-forest h-6"></p>

            <button id="analyze-btn" class="mt-4 w-full bg-brand-forest text-white font-bold py-3 px-6 rounded-lg shadow hover:bg-green-900 transition opacity-50 cursor-not-allowed" disabled>
                Analyze Report
            </button>
        </div>

        <div class="relative bg-brand-cream rounded-lg shadow-inner border border-brand-golden min-h-[400px]">
            <div id="loading" class="hidden absolute inset-0 bg-white bg-opacity-90 z-10 flex flex-col items-center justify-center rounded-lg">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-brand-forest"></div>
                <p class="mt-4 text-brand-forest font-semibold animate-pulse">Reading PDF & Analyzing...</p>
            </div>

            <div id="result-content" class="p-6 prose prose-sm max-w-none text-brand-olive">
                <h3 class="text-gray-400 italic text-center mt-20">Analysis results will appear here.</h3>
            </div>
        </div>
    </div>
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const fileNameDisplay = document.getElementById('file-name');
    const analyzeBtn = document.getElementById('analyze-btn');
    const loading = document.getElementById('loading');
    const resultContent = document.getElementById('result-content');

    // Handle File Selection
    dropZone.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', handleFileSelect);

    function handleFileSelect(e) {
        if (fileInput.files.length > 0) {
            const file = fileInput.files[0];
            if (file.type !== 'application/pdf') {
                alert("Please select a PDF file.");
                return;
            }
            fileNameDisplay.textContent = "Selected: " + file.name;
            analyzeBtn.disabled = false;
            analyzeBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            dropZone.classList.add('border-brand-forest', 'bg-green-50');
        }
    }

    // Handle Upload & Analysis
    analyzeBtn.addEventListener('click', async () => {
        if (fileInput.files.length === 0) return;

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);

        loading.classList.remove('hidden');
        resultContent.innerHTML = ''; // Clear previous

        try {
            const response = await fetch('/api/analyze_report', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.error) {
                resultContent.innerHTML = `<p class="text-red-600 font-bold">Error: ${data.error}</p>`;
            } else {
                resultContent.innerHTML = marked.parse(data.analysis);
            }
        } catch (error) {
            resultContent.innerHTML = `<p class="text-red-600 font-bold">Server Error: ${error.message}</p>`;
        } finally {
            loading.classList.add('hidden');
        }
    });
</script>
{% endblock %}
