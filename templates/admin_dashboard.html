{% extends "base.html" %}

{% block title %}Admin Dashboard{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8 max-w-6xl">
    <h1 class="text-3xl font-bold text-brand-forest mb-8">Admin Dashboard</h1>

    <div class="grid md:grid-cols-3 gap-8">
        
        <div class="md:col-span-1 bg-white p-6 rounded-lg shadow-md border border-brand-stone">
            <h2 class="text-xl font-bold mb-4 text-brand-forest">Add New Doctor</h2>
            <form action="{{ url_for('add_doctor') }}" method="POST" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium">Doctor Name</label>
                    <input type="text" name="name" required class="w-full border rounded p-2" placeholder="Dr. Name">
                </div>
                <div>
                    <label class="block text-sm font-medium">Specialty</label>
                    <select name="specialty" class="w-full border rounded p-2">
                        <option>General Physician</option>
                        <option>Cardiologist</option>
                        <option>Dermatologist</option>
                        <option>Neurologist</option>
                        <option>Dentist</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium">Phone</label>
                    <input type="text" name="phone" required class="w-full border rounded p-2" placeholder="+91...">
                </div>
                <div>
                    <label class="block text-sm font-medium">Address</label>
                    <textarea name="address" required class="w-full border rounded p-2" placeholder="Clinic Address"></textarea>
                </div>
                <button type="submit" class="w-full bg-brand-forest text-white py-2 rounded font-bold hover:bg-green-900">
                    Add Doctor
                </button>
            </form>
        </div>

        <div class="md:col-span-2 bg-white p-6 rounded-lg shadow-md border border-brand-stone">
            <h2 class="text-xl font-bold mb-4 text-brand-forest">Manage Doctors</h2>
            <table class="w-full text-left">
                <thead>
                    <tr class="border-b">
                        <th class="pb-2">Name</th>
                        <th class="pb-2">Specialty</th>
                        <th class="pb-2">Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for doctor in doctors %}
                    <tr class="border-b hover:bg-gray-50">
                        <td class="py-3 font-semibold">{{ doctor.name }}</td>
                        <td class="py-3 text-sm text-gray-600">{{ doctor.specialty }}</td>
                        <td class="py-3">
                            <a href="{{ url_for('delete_doctor', id=doctor.id) }}" class="text-red-600 hover:text-red-800 text-sm font-bold" onclick="return confirm('Delete this doctor?');">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
